<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tendoon - Free Growth Strategy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#000;
  color:white;
  text-align:center;
}

/* HEADER (MINIMAL) */
header{
  padding:20px;
}
header img{
  height:60px;
  cursor:pointer;
}

/* HERO */
.hero{
  padding:80px 20px 40px;
}

.hero h1{
  font-size:48px;
}

.hero p{
  color:#aaa;
  margin-top:10px;
}

/* TRUST */
.trust{
  margin-top:20px;
  color:#00C2FF;
  font-weight:600;
}

/* BENEFITS */
.benefits{
  margin-top:30px;
  line-height:1.8;
  color:#ccc;
}

/* FORM */
form{
  max-width:400px;
  margin:40px auto;
  display:flex;
  flex-direction:column;
  gap:15px;
}

input,textarea{
  padding:14px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

input:focus,textarea:focus{
  outline:none;
  box-shadow:0 0 10px #7B2FFF;
}

/* BUTTON */
button{
  padding:15px;
  background:linear-gradient(45deg,#7B2FFF,#00C2FF);
  border:none;
  border-radius:8px;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00C2FF;
}

/* URGENCY */
.urgency{
  color:#ff4d4d;
  margin-top:10px;
}

/* WHATSAPP CTA */
.whatsapp-btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  background:#25D366;
  border-radius:8px;
  color:white;
  text-decoration:none;
}

/* FOOTER */
footer{
  margin-top:60px;
  padding:20px;
  color:#777;
  font-size:14px;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <a href="index.html">
    <img src="logo2.png" alt="Tendoon Logo">
  </a>
</header>

<!-- HERO -->
<div class="hero">
  <h1>Get Your Free Growth Strategy 🚀</h1>
  <p>We’ll show you how to scale your business using AI, marketing & automation</p>

  <div class="trust">⚡ We reply within 24 hours</div>

  <div class="benefits">
    ✔ Custom growth roadmap<br>
    ✔ AI automation plan<br>
    ✔ Lead generation strategy
  </div>
</div>

<!-- FORM -->
<form action="https://formsubmit.co/your@email.com" method="POST">
  
  <input type="text" name="name" placeholder="Your Name" required>
  <input type="email" name="email" placeholder="Your Email" required>
  <textarea name="message" placeholder="Tell us about your business..." required></textarea>

  <input type="hidden" name="_captcha" value="false">

  <button type="submit">🚀 Get Free Strategy Call</button>

</form>

<div class="urgency">
  ⚠ Only 5 free strategy slots available this week
</div>

<a href="https://wa.me/919004230084?text=Hi%20I%20want%20a%20free%20strategy%20call" class="whatsapp-btn">
  💬 Chat on WhatsApp
</a>

<!-- FOOTER -->
<footer>
  <p>&copy; 2026 Tendoon</p>
</footer>

</body>
</html>
