<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tendoon - Contact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#000;
  color:white;
}

/* HEADER (MATCHED) */
header{
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  z-index:1000;
}

nav a{
  color:white;
  margin:0 12px;
  text-decoration:none;
  transition:0.3s;
}

nav a:hover{
  color:#00C2FF;
}

/* ✅ ACTIVE PAGE COLOR (FIROZI) */
nav a.active{
  color:#00C2FF;
}

/* SECTION */
section{
  text-align:center;
  padding:80px 20px;
}

h1{font-size:50px;}
p{color:#aaa;}

/* FORM */
form{
  max-width:420px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:15px;
}

input,textarea{
  padding:14px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  outline:none;
  transition:0.3s;
}

input:focus, textarea:focus{
  box-shadow:0 0 10px #7B2FFF;
}

/* BUTTON (MATCHED) */
button{
  padding:14px;
  background:linear-gradient(45deg,#7B2FFF,#00C2FF);
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00C2FF;
}

/* FOOTER */
footer{
  background:#111;
  text-align:center;
  padding:25px;
  color:#aaa;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <a href="index.html">
    <img src="logo2.png" style="height:60px;">
  </a>

  <nav>
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="about.html">About</a>
    <a href="contact.html" class="active">Contact</a>
  </nav>
</header>

<!-- TITLE -->
<section>
  <h1>Contact Us</h1>
  <p>Let’s grow your business together</p>
</section>

<!-- FORM -->
<section>
  <form action="https://formsubmit.co/your@email.com" method="POST">

    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Tell us about your business" required></textarea>

    <input type="hidden" name="_captcha" value="false">

    <button type="submit">Get Free Strategy Call</button>

  </form>

  <p style="margin-top:20px;">
    Or WhatsApp:
    <a href="https://wa.me/919004230084?text=Hi%20I%20want%20to%20grow%20my%20business%20with%20Tendoon" style="color:#00C2FF;text-decoration:none;">
      Click here
    </a>
  </p>
</section>

<!-- FOOTER -->
<footer>
  <p>&copy; 2026 Tendoon</p>
</footer>

<!-- WHATSAPP -->
<a href="https://wa.me/919004230084?text=Hi%20I%20want%20to%20grow%20my%20business%20with%20Tendoon" class="whatsapp">💬</a>

</body>
</html>
